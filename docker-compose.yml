services:
  postgres:
    image: postgres:16-alpine
    container_name: newsfeed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: newsfeed
      POSTGRES_USER: newsfeed
      POSTGRES_PASSWORD: newsfeed
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
