# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    # Dummy URL so prisma.config.ts can resolve env("DATABASE_URL") during
    # `prisma generate` / `build`. No real DB is needed — every page is
    # force-dynamic, so the build never connects. Job-level env covers all steps.
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

    strategy:
      matrix:
        node-version: [22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
    - run: npm ci
    - run: npx prisma generate          # ← 追加（client生成）
    - run: npm run lint                  # ← npm test の代わり（lintは存在）
    - run: npm run build --if-present
